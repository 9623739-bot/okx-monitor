<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKX Monitor - 登录</title>
    <link rel="stylesheet" href="css/base.css?v=2">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">⚡</div>
                <h1>OKX Monitor</h1>
                <p>合约异动监控交易系统</p>
            </div>

            <div id="loginError" class="login-error"></div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="username" placeholder="请输入用户名" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="password" placeholder="请输入密码" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">
                    <span id="loginBtnText">登 录</span>
                    <span id="loginBtnSpinner" class="loading-spinner" style="display:none;width:18px;height:18px;border-width:2px;"></span>
                </button>
            </form>
        </div>
    </div>

    <script src="js/common.js?v=2"></script>
    <script>
        (function () {
            // 已登录则跳转
            if (isLoggedIn()) {
                window.location.href = '/dashboard.html';
                return;
            }

            var form = document.getElementById('loginForm');
            var errorEl = document.getElementById('loginError');
            var btnText = document.getElementById('loginBtnText');
            var btnSpinner = document.getElementById('loginBtnSpinner');
            var loginBtn = document.getElementById('loginBtn');

            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                var username = document.getElementById('username').value.trim();
                var password = document.getElementById('password').value.trim();

                if (!username || !password) {
                    showError('请输入用户名和密码');
                    return;
                }

                // 显示loading
                btnText.style.display = 'none';
                btnSpinner.style.display = 'inline-block';
                loginBtn.disabled = true;
                errorEl.classList.remove('show');

                try {
                    var resp = await apiPost('/login', {
                        username: username,
                        password: password
                    });

                    if (resp.code === 200) {
                        setToken(resp.data.token);
                        window.location.href = '/dashboard.html';
                    } else {
                        showError(resp.message || '登录失败');
                    }
                } catch (err) {
                    showError('网络错误，请检查服务是否启动');
                } finally {
                    btnText.style.display = 'inline';
                    btnSpinner.style.display = 'none';
                    loginBtn.disabled = false;
                }
            });

            function showError(msg) {
                errorEl.textContent = msg;
                errorEl.classList.add('show');
                setTimeout(function () {
                    errorEl.classList.remove('show');
                }, 3000);
            }

            // Enter 键提交
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    form.dispatchEvent(new Event('submit'));
                }
            });
        })();
    </script>
</body>
</html>
